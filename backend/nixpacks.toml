# Railway build configuration — native deps required by SP-1.5 OCR.
#
# Tesseract drives the on-device OCR fallback for scanned PDFs. We
# install the six EU language packs that match our supported locale
# set (English + French + German + Dutch + Spanish + Italian).
#
# Poppler (poppler-utils) is required at runtime by the `pdf2image`
# Python package: it shells out to `pdftoppm` to render each PDF page
# to an image before Tesseract sees it.
#
# All packages are Debian/Ubuntu apt names — nixpacks resolves them on
# Railway's Debian-based build layer.

[phases.setup]
aptPkgs = [
  "tesseract-ocr",
  "tesseract-ocr-eng",
  "tesseract-ocr-fra",
  "tesseract-ocr-deu",
  "tesseract-ocr-nld",
  "tesseract-ocr-spa",
  "tesseract-ocr-ita",
  "poppler-utils",
]
